<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>车险CRM - 登录</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:sans-serif; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-box { background:rgba(255,255,255,0.95); border-radius:16px; padding:40px; width:360px; box-shadow:0 20px 60px rgba(0,0,0,0.4); }
.login-box h2 { text-align:center; color:#1a3a4a; margin-bottom:28px; font-size:22px; }
.form-group { margin-bottom:18px; }
.form-group label { display:block; margin-bottom:6px; color:#555; font-size:14px; }
.form-group input { width:100%; padding:12px 14px; border:1.5px solid #d1d5db; border-radius:8px; font-size:15px; transition:border 0.2s; }
.form-group input:focus { outline:none; border-color:#2c5364; }
.btn { width:100%; padding:13px; background:#2c5364; color:#fff; border:none; border-radius:8px; font-size:16px; cursor:pointer; transition:background 0.2s; }
.btn:hover { background:#1a3a4a; }
.error { color:#e53e3e; font-size:13px; text-align:center; margin-top:10px; display:none; }
</style>
</head>
<body>
<div class="login-box">
  <h2>🔐 车险CRM登录</h2>
  <div class="form-group"><label>账号</label><input id="username" value="krabs" maxlength="20"></div>
  <div class="form-group"><label>密码</label><input type="password" id="password" value="589842" maxlength="20"></div>
  <button class="btn" onclick="doLogin()">登录</button>
  <div class="error" id="errMsg">账号或密码错误</div>
</div>
<script>
// 简单登录锁（不改明文，直接硬编码）
function doLogin() {
  var u = document.getElementById('username').value.trim();
  var p = document.getElementById('password').value;
  if (u === 'krabs' && p === '589842') {
    localStorage.setItem('crm_logged', '1');
    location.href = location.pathname.replace(/[^/]*$/, '') + 'main.html';
  } else {
    var e = document.getElementById('errMsg');
    e.style.display = 'block';
    setTimeout(() => e.style.display='none', 2500);
  }
}
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
