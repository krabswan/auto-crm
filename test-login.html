<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汽车全生态CRM - 测试版</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
  background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1d4ed8 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card { 
  background: #fff; 
  border-radius: 24px; 
  padding: 48px; 
  width: 100%; 
  max-width: 440px; 
  box-shadow: 0 25px 60px rgba(0,0,0,0.3); 
}
.login-logo { 
  display: flex; 
  align-items: center; 
  gap: 14px; 
  font-size: 22px; 
  font-weight: 800; 
  color: #2563eb; 
  margin-bottom: 8px; 
}
.login-sub { color: #94a3b8; font-size: 13px; margin-bottom: 32px; }
.form-group { margin-bottom: 18px; }
.form-group label { 
  display: block; 
  font-size: 12px; 
  font-weight: 600; 
  color: #64748b; 
  margin-bottom: 6px; 
}
.form-group input { 
  width: 100%; 
  padding: 12px 16px; 
  border: 2px solid #e2e8f0; 
  border-radius: 10px; 
  font-size: 15px; 
}
.form-group input:focus { 
  border-color: #2563eb; 
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1); 
}
.btn-login { 
  width: 100%; 
  padding: 14px; 
  background: #2563eb; 
  color: #fff; 
  border: none; 
  border-radius: 10px; 
  font-size: 16px; 
  font-weight: 700; 
  cursor: pointer;
}
.btn-login:hover { background: #1d4ed8; }

/* 登录后 */
.dashboard { display: none; padding: 20px; }
.dashboard.show { display: block; }
.sidebar { 
  width: 240px; 
  background: #0f172a; 
  height: 100vh; 
  position: fixed; 
  left: 0; 
  top: 0; 
  padding: 20px;
  color: white;
}
.main { margin-left: 240px; padding: 20px; }
.stat-grid { 
  display: grid; 
  grid-template-columns: repeat(4, 1fr); 
  gap: 16px; 
  margin-bottom: 24px; 
}
.stat-card { 
  background: white; 
  border-radius: 12px; 
  padding: 20px; 
  box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
}
.stat-num { font-size: 28px; font-weight: 800; color: #2563eb; }
.stat-label { font-size: 12px; color: #64748b; margin-top: 4px; }
h1 { color: white; margin-bottom: 20px; }
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-card" id="loginPage">
  <div class="login-logo">
    <span>🦀</span>
    <span>汽车全生态CRM</span>
  </div>
  <div class="login-sub">蟹老板的车险客户管理系统</div>
  
  <div class="form-group">
    <label>用户名</label>
    <input type="text" id="username" placeholder="请输入用户名" value="krabs">
  </div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="password" placeholder="请输入密码" value="589842">
  </div>
  
  <button class="btn-login" onclick="doLogin()">登 录</button>
  <p id="error" style="color: red; text-align: center; margin-top: 12px; display: none;">登录失败，请重试</p>
</div>

<!-- 登录后页面 -->
<div class="dashboard" id="dashboard">
  <div class="sidebar">
    <h1>🦀 汽车CRM</h1>
    <div style="padding: 20px 0;">
      <div style="padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">📊 工作台</div>
      <div style="padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">👥 客户管理</div>
      <div style="padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">🚗 车辆管理</div>
      <div style="padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">🔖 车险管理</div>
      <div style="padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">🏷️ 非车险</div>
      <div style="padding: 10px 0;">⚙️ 系统设置</div>
    </div>
  </div>
  <div class="main">
    <h2 style="margin-bottom: 20px;">欢迎回来，蟹老板！</h2>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num" id="custCount">0</div>
        <div class="stat-label">客户总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="vehCount">0</div>
        <div class="stat-label">车辆总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="policyCount">0</div>
        <div class="stat-label">保单总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">¥0</div>
        <div class="stat-label">累计佣金</div>
      </div>
    </div>
    <p style="color: #64748b;">系统运行正常！这是简化测试版。</p>
  </div>
</div>

<script>
function doLogin() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  
  if ((u === 'krabs' && p === '589842') || (u === 'admin' && p === 'admin')) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').classList.add('show');
  } else {
    document.getElementById('error').style.display = 'block';
  }
}

// 按回车登录
document.getElementById('password').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>

</body>
</html>
